spring.application.name=Order Returns System

# Server — Render sets PORT; local default is 8080
server.port=${PORT:8080}

# MongoDB — set SPRING_DATA_MONGODB_URI in production (MongoDB Atlas)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/returnsdb}
spring.data.mongodb.auto-index-creation=true

# Thymeleaf — enable cache in production for better performance
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
