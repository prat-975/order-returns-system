<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Error — User Return System')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar('')}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="app-card">
                <div class="error-card">
                    <div class="error-icon">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <h2 class="h4 fw-bold mb-2" th:text="${errorTitle}">Something Went Wrong</h2>
                    <p class="text-muted mb-4" th:text="${errorMessage}">
                        An unexpected error occurred. Please try again later.
                    </p>
                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
                        <a href="/" class="btn btn-primary" sec:authorize="hasRole('USER')">
                            <i class="bi bi-house me-1"></i> Go to Home
                        </a>
                        <a href="/my-returns" class="btn btn-outline-secondary" sec:authorize="hasRole('USER')">
                            <i class="bi bi-list-ul me-1"></i> My Returns
                        </a>
                        <a href="/returns" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">
                            <i class="bi bi-list-ul me-1"></i> Manage Returns
                        </a>
                        <a href="/login" class="btn btn-primary" sec:authorize="!isAuthenticated()">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
