<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register — User Return System')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar('register')}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="app-card auth-card">
                <div class="app-card-header text-center">
                    <h2><i class="bi bi-person-plus text-primary"></i> Create Account</h2>
                </div>
                <div class="app-card-body">
                    <form th:action="@{/register}" th:object="${registerForm}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}"
                                   placeholder="Choose a username">
                            <div class="field-error" th:if="${#fields.hasErrors('username')}">
                                <i class="bi bi-exclamation-circle"></i>
                                <span th:errors="*{username}"></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}"
                                   placeholder="At least 6 characters">
                            <div class="field-error" th:if="${#fields.hasErrors('password')}">
                                <i class="bi bi-exclamation-circle"></i>
                                <span th:errors="*{password}"></span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   th:field="*{confirmPassword}" placeholder="Re-enter password">
                            <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}">
                                <i class="bi bi-exclamation-circle"></i>
                                <span th:errors="*{confirmPassword}"></span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-person-check me-1"></i> Register
                        </button>
                    </form>

                    <p class="text-center text-muted small mt-4 mb-0">
                        Already have an account?
                        <a href="/login">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
