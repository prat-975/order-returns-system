<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Sign Out — User Return System')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar('')}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="app-card auth-card logout-card">
                <div class="logout-icon-wrap">
                    <i class="bi bi-box-arrow-right"></i>
                </div>
                <h2 class="logout-title">Sign out?</h2>
                <p class="logout-text text-muted">
                    You are signed in as
                    <strong sec:authentication="name">user</strong>.
                    End your session on this device?
                </p>

                <form th:action="@{/logout}" method="post" class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-box-arrow-right me-1"></i> Yes, sign out
                    </button>
                    <a href="/" class="btn btn-outline-secondary" sec:authorize="hasRole('USER')">
                        <i class="bi bi-arrow-left me-1"></i> Cancel
                    </a>
                    <a href="/returns" class="btn btn-outline-secondary" sec:authorize="hasRole('ADMIN')">
                        <i class="bi bi-arrow-left me-1"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
